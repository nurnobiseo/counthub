<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
           background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .input-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 15px;
        }
        
        .input-box {
            flex: 1;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #2575fc;
            box-shadow: 0 0 0 2px rgba(37, 117, 252, 0.2);
        }
        
        button {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 117, 252, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .result.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .result h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .age-result {
            display: flex;
            justify-content: space-around;
        }
        
        .age-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 30%;
        }
        
        .age-value {
            font-size: 24px;
            font-weight: 700;
            color: #2575fc;
            margin-bottom: 5px;
        }
        
        .age-label {
            font-size: 14px;
            color: #666;
        }
        
        .error {
            color: #ff3860;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
                gap: 20px;
            }
            
            .age-result {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .age-box {
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Age Calculator</h1>
        <p class="description">Enter your date of birth and we'll calculate your exact age in years, months, and days.</p>
        
        <div class="input-group">
            <div class="input-box">
                <label for="day">Day</label>
                <input type="number" id="day" placeholder="DD" min="1" max="31">
                <div class="error" id="day-error">Please enter a valid day</div>
            </div>
            
            <div class="input-box">
                <label for="month">Month</label>
                <input type="number" id="month" placeholder="MM" min="1" max="12">
                <div class="error" id="month-error">Please enter a valid month</div>
            </div>
            
            <div class="input-box">
                <label for="year">Year</label>
                <input type="number" id="year" placeholder="YYYY" min="1900" max="2023">
                <div class="error" id="year-error">Please enter a valid year</div>
            </div>
        </div>
        
        <button id="calculate-btn">Calculate Age</button>
        
        <div class="result" id="result">
            <h3>Your Age is</h3>
            <div class="age-result">
                <div class="age-box">
                    <div class="age-value" id="years">0</div>
                    <div class="age-label">Years</div>
                </div>
                <div class="age-box">
                    <div class="age-value" id="months">0</div>
                    <div class="age-label">Months</div>
                </div>
                <div class="age-box">
                    <div class="age-value" id="days">0</div>
                    <div class="age-label">Days</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dayInput = document.getElementById('day');
            const monthInput = document.getElementById('month');
            const yearInput = document.getElementById('year');
            const calculateBtn = document.getElementById('calculate-btn');
            const resultDiv = document.getElementById('result');
            const yearsElement = document.getElementById('years');
            const monthsElement = document.getElementById('months');
            const daysElement = document.getElementById('days');
            const dayError = document.getElementById('day-error');
            const monthError = document.getElementById('month-error');
            const yearError = document.getElementById('year-error');
            
            calculateBtn.addEventListener('click', function() {
                // Reset errors
                dayError.classList.remove('show');
                monthError.classList.remove('show');
                yearError.classList.remove('show');
                
                const day = parseInt(dayInput.value);
                const month = parseInt(monthInput.value);
                const year = parseInt(yearInput.value);
                
                let isValid = true;
                
                // Validation
                if (isNaN(day) || day < 1 || day > 31) {
                    dayError.classList.add('show');
                    isValid = false;
                }
                
                if (isNaN(month) || month < 1 || month > 12) {
                    monthError.classList.add('show');
                    isValid = false;
                }
                
                const currentYear = new Date().getFullYear();
                if (isNaN(year) || year < 1900 || year > currentYear) {
                    yearError.classList.add('show');
                    isValid = false;
                }
                
                // Check if date is valid (e.g., not February 30)
                if (isValid) {
                    const date = new Date(year, month - 1, day);
                    if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) {
                        dayError.classList.add('show');
                        isValid = false;
                    }
                }
                
                if (isValid) {
                    calculateAge(day, month, year);
                    resultDiv.classList.add('active');
                } else {
                    resultDiv.classList.remove('active');
                }
            });
            
            function calculateAge(day, month, year) {
                const today = new Date();
                const birthDate = new Date(year, month - 1, day);
                
                let ageYears = today.getFullYear() - birthDate.getFullYear();
                let ageMonths = today.getMonth() - birthDate.getMonth();
                let ageDays = today.getDate() - birthDate.getDate();
                
                if (ageDays < 0) {
                    ageMonths--;
                    // Get the number of days in the previous month
                    const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                    ageDays += lastMonth.getDate();
                }
                
                if (ageMonths < 0) {
                    ageYears--;
                    ageMonths += 12;
                }
                
                // Update the UI with the calculated age
                yearsElement.textContent = ageYears;
                monthsElement.textContent = ageMonths;
                daysElement.textContent = ageDays;
            }
            
            // Allow only numbers in input fields
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                });
            });
        });
    </script>
    <!-- home button -->
  <script>
(function(){
    // Create container anchor
    const a = document.createElement('a');
    a.href = '/'; // change home URL if needed
    a.title = 'Back to Home';
    a.style.cssText = `
        position: fixed;
        right: 100px;
        bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 30px;
        background: white;
        border: 1px solid rgba(0,0,0,0.1);
        box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        text-decoration: none;
        color: black;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 9999;
        transition: transform .12s ease, box-shadow .12s ease;
    `;
    a.onmousedown = ()=>a.style.transform='scale(.96)';
    a.onmouseup = ()=>a.style.transform='scale(1)';

    // Create SVG icon
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    svg.setAttribute('stroke-width','2');
    svg.setAttribute('stroke-linecap','round');
    svg.setAttribute('stroke-linejoin','round');
    svg.style.width = '24px';
    svg.style.height = '24px';
    svg.innerHTML = `<path d="M3 9L12 2l9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-5h-4v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>`;

    // Create text span
    const span = document.createElement('span');
    span.textContent = 'Back to Home';

    a.appendChild(svg);
    a.appendChild(span);
    document.body.appendChild(a);
})();
</script>
</body>
</html>
