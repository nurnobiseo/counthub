<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator - Calculator Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 30px auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .calculator {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2575fc;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #2575fc;
        }

        .calculate-btn {
            display: block;
            width: 100%;
            background: #2575fc;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .calculate-btn:hover {
            background: #1a60d0;
        }

        .results {
            margin-top: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            display: none;
        }

        .results h3 {
            color: #2575fc;
            margin-bottom: 15px;
            text-align: center;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #555;
        }

        .result-value {
            font-weight: 600;
            color: #2575fc;
        }

        .footer {
            text-align: center;
            color: white;
            padding: 30px 0 10px;
            margin-top: 20px;
            opacity: 0.8;
        }

        @media (max-width: 500px) {
            .container {
                width: 95%;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .calculator {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Percentage Calculator</h1>
            <p>Calculate percentages, increases, decreases, and more</p>
        </div>

        <div class="calculator">
            <div class="input-group">
                <label for="value1">What is</label>
                <input type="number" id="value1" placeholder="Enter value">
            </div>
            
            <div class="input-group">
                <label for="percentage">% of</label>
                <input type="number" id="percentage" placeholder="Enter percentage">
            </div>
            
            <div class="input-group">
                <label for="value2">?</label>
                <input type="number" id="value2" placeholder="Enter value" disabled>
            </div>

            <button class="calculate-btn" id="calculate">
                Calculate
            </button>

            <div class="results" id="results">
                <h3>Calculation Results</h3>
                
                <div class="result-item">
                    <span class="result-label">Percentage:</span>
                    <span class="result-value" id="result-percentage"></span>
                </div>
                
                <div class="result-item">
                    <span class="result-label">Result:</span>
                    <span class="result-value" id="result-value"></span>
                </div>
                
                <div class="result-item">
                    <span class="result-label">Equation:</span>
                    <span class="result-value" id="result-equation"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Calculator Hub &copy; 2025. All rights reserved.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const calculateBtn = document.getElementById('calculate');
            const results = document.getElementById('results');
            const value1Input = document.getElementById('value1');
            const percentageInput = document.getElementById('percentage');
            const value2Input = document.getElementById('value2');
            
            calculateBtn.addEventListener('click', function() {
                const value1 = parseFloat(value1Input.value);
                const percentage = parseFloat(percentageInput.value);
                
                if (isNaN(value1) || isNaN(percentage)) {
                    alert('Please enter valid numbers in both fields');
                    return;
                }
                
                const result = (value1 * percentage) / 100;
                const resultPercentage = `${percentage}%`;
                const resultValue = result.toFixed(2);
                const resultEquation = `${value1} × ${percentage}% = ${resultValue}`;
                
                document.getElementById('result-percentage').textContent = resultPercentage;
                document.getElementById('result-value').textContent = resultValue;
                document.getElementById('result-equation').textContent = resultEquation;
                
                results.style.display = 'block';
            });
            
            // Allow calculations by pressing Enter key
            percentageInput.addEventListener('keyup', function(event) {
                if (event.key === 'Enter') {
                    calculateBtn.click();
                }
            });
        });
    </script>
    <!-- home button -->
  <script>
(function(){
    // Create container anchor
    const a = document.createElement('a');
    a.href = '/'; // change home URL if needed
    a.title = 'Back to Home';
    a.style.cssText = `
        position: fixed;
        right: 100px;
        bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 30px;
        background: white;
        border: 1px solid rgba(0,0,0,0.1);
        box-shadow: 0 6px 18px rgba(0,0,0,0.18);
        text-decoration: none;
        color: black;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 9999;
        transition: transform .12s ease, box-shadow .12s ease;
    `;
    a.onmousedown = ()=>a.style.transform='scale(.96)';
    a.onmouseup = ()=>a.style.transform='scale(1)';

    // Create SVG icon
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    svg.setAttribute('stroke-width','2');
    svg.setAttribute('stroke-linecap','round');
    svg.setAttribute('stroke-linejoin','round');
    svg.style.width = '24px';
    svg.style.height = '24px';
    svg.innerHTML = `<path d="M3 9L12 2l9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-5h-4v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>`;

    // Create text span
    const span = document.createElement('span');
    span.textContent = 'Back to Home';

    a.appendChild(svg);
    a.appendChild(span);
    document.body.appendChild(a);
})();
</script>
</body>
</html>
