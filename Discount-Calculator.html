<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo i {
            font-size: 2.5rem;
            color: #6a11cb;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #6a11cb;
        }
        
        .slider-container {
            margin-top: 10px;
        }
        
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #6a11cb;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .slider::-webkit-slider-thumb:hover {
            background: #2575fc;
            transform: scale(1.1);
        }
        
        .slider-value {
            text-align: center;
            font-weight: 600;
            color: #6a11cb;
            margin-top: 10px;
            font-size: 1.2rem;
        }
        
        .results {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .result-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .result-line:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
            font-weight: 700;
            font-size: 1.2rem;
            color: #6a11cb;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .calculate-btn:active {
            transform: translateY(0);
        }
        
        .savings-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #4cd964;
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-tag"></i>
        </div>
        <h1>Discount Calculator</h1>
        <p class="subtitle">Calculate how much you'll save with discounts</p>
        
        <div class="input-group">
            <label for="original-price">Original Price ($)</label>
            <input type="number" id="original-price" placeholder="Enter original price" min="0" step="0.01">
        </div>
        
        <div class="input-group">
            <label for="discount-percent">Discount Percentage</label>
            <input type="range" id="discount-percent" class="slider" min="0" max="100" value="20" step="1">
            <div class="slider-value"><span id="discount-value">20</span>%</div>
        </div>
        
        <div class="input-group">
            <label for="discount-amount">Or Enter Discount Amount ($)</label>
            <input type="number" id="discount-amount" placeholder="Enter discount amount" min="0" step="0.01">
        </div>
        
        <button class="calculate-btn" id="calculate">Calculate Discount</button>
        
        <div class="results">
            <div class="result-line">
                <div>Original Price:</div>
                <div id="original-amount">$0.00</div>
            </div>
            <div class="result-line">
                <div>Discount Amount: <span class="savings-badge">You Save!</span></div>
                <div id="savings-amount">$0.00</div>
            </div>
            <div class="result-line">
                <div>Final Price:</div>
                <div id="final-price">$0.00</div>
            </div>
        </div>
    </div>

    <!-- Back Button Script -->
    <script>
        (function(){
            // Create container anchor
            const a = document.createElement('a');
            a.href = '/'; // change home URL if needed
            a.title = 'Back to Home';
            a.style.cssText = `
                position: fixed;
                right: 100px;
                bottom: 16px;
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                border-radius: 30px;
                background: white;
                border: 1px solid rgba(0,0,0,0.1);
                box-shadow: 0 6px 18px rgba(0,0,0,0.18);
                text-decoration: none;
                color: black;
                font-family: sans-serif;
                font-size: 14px;
                z-index: 9999;
                transition: transform .12s ease, box-shadow .12s ease;
            `;
            a.onmousedown = ()=>a.style.transform='scale(.96)';
            a.onmouseup = ()=>a.style.transform='scale(1)';

            // Create SVG icon
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('viewBox','0 0 24 24');
            svg.setAttribute('fill','none');
            svg.setAttribute('stroke','currentColor');
            svg.setAttribute('stroke-width','2');
            svg.setAttribute('stroke-linecap','round');
            svg.setAttribute('stroke-linejoin','round');
            svg.style.width = '24px';
            svg.style.height = '24px';
            svg.innerHTML = `<path d="M3 9L12 2l9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-5h-4v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/>`;

            // Create text span
            const span = document.createElement('span');
            span.textContent = 'Back to Home';

            a.appendChild(svg);
            a.appendChild(span);
            document.body.appendChild(a);
        })();
    </script>

    <!-- Discount Calculator Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const originalPriceInput = document.getElementById('original-price');
            const discountPercentSlider = document.getElementById('discount-percent');
            const discountValueDisplay = document.getElementById('discount-value');
            const discountAmountInput = document.getElementById('discount-amount');
            const calculateBtn = document.getElementById('calculate');
            const originalAmountEl = document.getElementById('original-amount');
            const savingsAmountEl = document.getElementById('savings-amount');
            const finalPriceEl = document.getElementById('final-price');
            
            // Update discount value display when slider moves
            discountPercentSlider.addEventListener('input', function() {
                discountValueDisplay.textContent = this.value;
                // Clear discount amount input when using slider
                discountAmountInput.value = '';
            });
            
            // Clear slider value when manually entering discount amount
            discountAmountInput.addEventListener('input', function() {
                if (this.value) {
                    discountPercentSlider.value = 0;
                    discountValueDisplay.textContent = '0';
                }
            });
            
            // Calculate discount
            calculateBtn.addEventListener('click', function() {
                const originalPrice = parseFloat(originalPriceInput.value);
                
                if (isNaN(originalPrice) || originalPrice <= 0) {
                    alert('Please enter a valid original price');
                    return;
                }
                
                let discountAmount = 0;
                
                // Check if discount amount is manually entered
                if (discountAmountInput.value) {
                    discountAmount = parseFloat(discountAmountInput.value);
                    
                    if (discountAmount >= originalPrice) {
                        alert('Discount amount cannot be greater than or equal to original price');
                        return;
                    }
                } else {
                    // Calculate discount from percentage
                    const discountPercent = parseFloat(discountPercentSlider.value);
                    discountAmount = originalPrice * (discountPercent / 100);
                }
                
                const finalPrice = originalPrice - discountAmount;
                
                originalAmountEl.textContent = `$${originalPrice.toFixed(2)}`;
                savingsAmountEl.textContent = `$${discountAmount.toFixed(2)}`;
                finalPriceEl.textContent = `$${finalPrice.toFixed(2)}`;
            });
            
            // Initialize with example values
            originalPriceInput.value = "100";
            discountPercentSlider.value = "20";
            discountValueDisplay.textContent = "20";
            
            // Calculate initial values
            calculateBtn.click();
        });
    </script>
</body>
</html>
